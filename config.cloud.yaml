# gateway/config.cloud.yaml — GCP Cloud Run 배포용 모델 config.
# =============================================================================
# config.prod.yaml(사내 운영 로컬 기동)을 템플릿으로 한 Cloud Run 전용 프로필이다.
# 스키마·model_info 계약은 config.yaml 헤더 주석이 정본 — 여기 중복하지 않는다.
#
# 차이점(vs config.prod.yaml):
#   1) Gemini effort 노출: claude-gemini-3.6-flash(B안 — claude- 프리픽스로 /effort 네이티브화,
#      Task 6 라이브 판정 PASS) + gemini-3.6-flash(정직 이름·backend·서버측 고정 thinking) 병존.
#   2) DB 모드: DATABASE_URL은 Cloud Run env가 공급(config에 참조 불요 — litellm이 env를 직접 읽음).
#   3) 모델 카탈로그를 backend가 AGENT_MODELS_CONFIG로 읽을 수 있게 model_info 유지(스펙 D8-③).

model_list:
  # ── 사내 vLLM (Cloud Run → Direct VPC egress → on-prem) ──────────────────────
  - model_name: qwen-3.5
    litellm_params:
      model: hosted_vllm/Qwen/Qwen3.5-122B-A10B-FP8
      api_base: http://10.36.114.31:30091/v1
      api_key: os.environ/LLM_API_KEY_QWEN
      additional_drop_params: ["output_config", "context_management"]
    model_info:
      display_name: "Qwen 3.5"
      description: "내부(vLLM) 서빙"
      context_window: 262144
      max_output: 16384
      compaction_ratio: 0.8
      strip_leading_reasoning: true
      default: true

  # ── GCP Vertex AI — Claude 2종(effort는 CLI 네이티브, 추가 처리 불요) ─────────
  - model_name: claude-sonnet-5
    litellm_params:
      model: vertex_ai/claude-sonnet-5
      vertex_project: os.environ/VERTEX_AI_PROJECT
      vertex_location: os.environ/VERTEX_AI_LOCATION
    model_info:
      display_name: "Claude Sonnet 5"
      description: "GCP Vertex AI"
      context_window: 1000000
      # 공식 모델 표 확인(platform.claude.com/docs/en/about-claude/models/overview, 2026-07-22):
      # Claude Sonnet 5 Max output = 128k tokens. 초기 보수값 64000이었던 걸 온보딩 확정치로 교정.
      max_output: 128000
      compaction_ratio: 0.8
      strip_leading_reasoning: false

  - model_name: claude-opus-4-8
    litellm_params:
      model: vertex_ai/claude-opus-4-8
      vertex_project: os.environ/VERTEX_AI_PROJECT
      vertex_location: os.environ/VERTEX_AI_LOCATION
    model_info:
      display_name: "Claude Opus 4.8"
      description: "GCP Vertex AI"
      context_window: 1000000
      # 공식 모델 표: Claude Opus 4.8 Max output = 128k tokens(2026-07-22 확인, 초기 보수값 64000 교정)
      max_output: 128000
      compaction_ratio: 0.8
      strip_leading_reasoning: false

  # ── GCP Vertex AI — Gemini (B안: claude- 프리픽스로 /effort 네이티브화) ──────────
  # Task 6 라이브 판정 PASS(2026-07-22) — CLI가 claude- 이름에 output_config(effort)·thinking을
  # 실어 전송하고 gemini 어댑터가 정상 수용함을 실측(effort=high→reasoning_effort='high',
  # effort=low→'low' 가변 확인·CLI e2e 정답·400 없음). /effort low|medium|high|xhigh|max 그대로 동작.
  # ⚠️ 감사 주의: display_name으로 실체(Gemini)를 명시 — Admin UI/spend에 Claude로 오인 방지.
  # gemini-3.6-flash는 litellm 비용맵에 완전히 없음(1.95.0-dev+에만 존재 — 가격뿐 아니라 max_tokens·
  # supports_* capability 플래그까지 전무, 유사 등재 모델 vertex_ai/gemini-3.5-flash 스키마 대조로 확인).
  # 상위 stable 편입 시 아래 수기 블록 전체 제거 가능.
  # 공식 스펙 2종 교차 확인(2026-07-22):
  #  ① 요금(cloud.google.com/vertex-ai/generative-ai/pricing, standard tier) — 입력 $1.50/1M·출력
  #     $7.50/1M(입력 크기 무관 균일가) → /1e6 토큰당 환산(0.0000015/0.0000075). 이전 플레이스홀더
  #     (0.0000003/0.0000025)는 입력 5배·출력 3배 낮게 잡혀 있었음 — 정정됨.
  #  ② 토큰 한도(ai.google.dev/gemini-api/docs/models 등 다중 소스) — 입력 1,048,576·출력 65,536
  #     (마케팅 표기 "1M/64K"의 정밀값 — 이전에 넣은 1000000/65535는 근사치였음, 둘 다 정정).
  # litellm 네이티브 키(max_tokens·max_input_tokens·max_output_tokens·litellm_provider·mode·
  # supports_reasoning 등)도 함께 채운다 — 이건 우리 backend 전용 키(context_window·max_output)와
  # 별개 네임스페이스로, litellm 자신의 /model/info 응답·내부 라우팅 판단이 참조한다(vertex_ai/
  # gemini-3.5-flash 항목의 실제 litellm 스키마를 그대로 따름 — 3.6 고유 확장 capability는 미검증이라
  # 과잉 주장 안 함, function_calling·vision·system_messages·reasoning만 우리가 실사용으로 직접 확인한
  # 것 + 모든 현세대 Gemini의 표준 기능이라 보수적으로 신뢰).
  - model_name: claude-gemini-3.6-flash
    litellm_params:
      model: vertex_ai/gemini-3.6-flash
      vertex_project: os.environ/VERTEX_AI_PROJECT
      vertex_location: os.environ/VERTEX_AI_LOCATION
      additional_drop_params: ["output_config", "context_management"]
    model_info:
      display_name: "Gemini 3.6 Flash (effort 지원)"
      description: "GCP Vertex AI · 실체=gemini-3.6-flash"
      context_window: 1048576
      max_output: 65536
      strip_leading_reasoning: false
      input_cost_per_token: 0.0000015
      output_cost_per_token: 0.0000075
      max_tokens: 65536
      max_input_tokens: 1048576
      max_output_tokens: 65536
      litellm_provider: "vertex_ai"
      mode: "chat"
      supports_reasoning: true
      supports_function_calling: true
      supports_vision: true
      supports_system_messages: true
      supports_tool_choice: true

  # backend·비-effort 클라이언트용 정직 이름 엔트리(서버측 고정 thinking) — 병존, 위와 동일 스펙.
  - model_name: gemini-3.6-flash
    litellm_params:
      model: vertex_ai/gemini-3.6-flash
      vertex_project: os.environ/VERTEX_AI_PROJECT
      vertex_location: os.environ/VERTEX_AI_LOCATION
      additional_drop_params: ["output_config", "context_management"]
      thinking: { type: enabled, budget_tokens: 2048 }
    model_info:
      display_name: "Gemini 3.6 Flash"
      description: "GCP Vertex AI"
      context_window: 1048576
      max_output: 65536
      strip_leading_reasoning: false
      input_cost_per_token: 0.0000015
      output_cost_per_token: 0.0000075
      max_tokens: 65536
      max_input_tokens: 1048576
      max_output_tokens: 65536
      litellm_provider: "vertex_ai"
      mode: "chat"
      supports_reasoning: true
      supports_function_calling: true
      supports_vision: true
      supports_system_messages: true
      supports_tool_choice: true

litellm_settings:
  drop_params: true
  telemetry: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
